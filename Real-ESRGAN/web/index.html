<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-ESRGAN 图像超分辨率系统</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            margin: 16px 0 28px;
            font-weight: 800;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
            padding: 22px;
            margin-bottom: 22px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px 18px;
            margin-bottom: 16px;
        }

        .form-row label {
            font-weight: 700;
            min-width: 90px;
        }

        input[type="file"] {
            max-width: 100%;
        }

        select,
        button {
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #d0d7e2;
            padding: 10px 14px;
        }

        select {
            min-width: 320px;
            background: #fff;
        }

        button {
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .primary-btn {
            background: #1677ff;
            color: #fff;
            border: none;
        }

        .secondary-btn {
            background: #fff;
            color: #1677ff;
            border: 1px solid #1677ff;
        }

        .ghost-btn {
            background: #f3f6fb;
            color: #333;
            border: 1px solid #d8e0ea;
        }

        .status {
            margin-top: 8px;
            font-weight: 700;
            color: #1677ff;
        }

        .status.error {
            color: #d93025;
        }

        .tip {
            margin: 0 0 14px;
            color: #555;
            font-size: 15px;
            background: #f6f9ff;
            border-left: 4px solid #1677ff;
            padding: 10px 12px;
            border-radius: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .panel {
            border: 1px solid #e4e8ef;
            border-radius: 14px;
            padding: 16px;
            background: #fff;
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 20px;
        }

        .preview-wrap {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #fafafa;
            border: 1px solid #e9edf3;
        }

        .preview-wrap img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            display: block;
            background: #fafafa;
            cursor: zoom-in;
        }

        .info {
            margin-top: 10px;
            font-size: 15px;
            color: #333;
            line-height: 1.6;
            word-break: break-word;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .batch-box {
            margin-top: 12px;
            border: 1px dashed #cfd8e3;
            border-radius: 12px;
            background: #f8fbff;
            padding: 14px;
        }

        .batch-results {
            margin-top: 12px;
        }

        .batch-item {
            border: 1px solid #dfe6f1;
            border-radius: 10px;
            background: #fff;
            padding: 12px;
            margin-top: 10px;
        }

        .batch-item strong {
            display: block;
            margin-bottom: 6px;
        }

        .batch-item .line {
            font-size: 14px;
            color: #444;
            margin-bottom: 2px;
        }

        .batch-summary-actions {
            margin-top: 12px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 96vw;
            max-height: 92vh;
            background: #111;
            border-radius: 12px;
            padding: 12px;
        }

        .modal-content img {
            display: block;
            max-width: 100%;
            max-height: 88vh;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            font-size: 20px;
            cursor: pointer;
            z-index: 2;
        }

        @media (max-width: 900px) {
            h1 {
                font-size: 30px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            select {
                min-width: 100%;
            }

            .form-row label {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-ESRGAN 图像超分辨率系统</h1>

        <div class="card">
            <div class="form-row">
                <label for="imageInput">选择图片：</label>
                <input type="file" id="imageInput" accept="image/*" />
            </div>

            <div class="form-row">
                <label for="modelSelect">模型：</label>
                <select id="modelSelect">
                    <option value="RealESRGAN_x4plus">RealESRGAN_x4plus（通用增强，细节均衡）</option>
                    <option value="RealESRGAN_x4plus_anime_6B">RealESRGAN_x4plus_anime_6B（动漫专用，线条锐利）</option>
                    <option value="realesr-general-x4v3">realesr-general-x4v3（轻量快速，日常适用）</option>
                </select>

                <button id="processBtn" class="primary-btn" type="button">开始超分</button>
                <button id="batchBtn" class="ghost-btn" type="button">批量处理</button>
                <input type="file" id="batchImageInput" accept="image/*" multiple style="display:none;" />
                <button id="batchProcessBtn" class="primary-btn" type="button">开始批量超分</button>
            </div>

            <p class="tip">以下图片为等宽展示，实际分辨率见下方标注。</p>
            <div id="status" class="status">请选择一张图片并开始处理</div>

            <div class="batch-box">
                <div id="batchStatus" class="status">批量处理：请先点击“批量处理”选择多张图片</div>
                <div id="batchSummaryActions" class="batch-summary-actions">
                    <button id="allDownloadOutputBtn" class="secondary-btn" type="button">全部下载超分结果</button>
                    <button id="allDownloadCompareBtn" class="secondary-btn" type="button">全部下载对比图</button>
                </div>
                <div id="batchResults" class="batch-results"></div>
            </div>
        </div>

        <div class="card">
            <div class="grid">
                <div class="panel">
                    <h2>原图</h2>
                    <div class="preview-wrap">
                        <img id="inputPreview" alt="原图预览" src="" />
                    </div>
                    <div id="inputInfo" class="info">未上传图片</div>
                    <div class="actions">
                        <button id="downloadInputBtn" class="secondary-btn" type="button">下载原图</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>超分结果</h2>
                    <div class="preview-wrap">
                        <img id="outputPreview" alt="超分结果预览" src="" />
                    </div>
                    <div id="outputInfo" class="info">暂无结果</div>
                    <div class="actions">
                        <button id="downloadOutputBtn" class="secondary-btn" type="button">下载超分结果</button>
                        <button id="downloadCompareBtn" class="secondary-btn" type="button">下载对比图</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <button id="modalClose" class="close-btn" type="button">×</button>
            <img id="modalImg" alt="放大预览" />
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
